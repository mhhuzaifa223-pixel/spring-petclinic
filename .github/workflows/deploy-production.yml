name: Deploy To Production

on:
  push:
    branches:
    - main

jobs:
  deploy:
   runs-on: ubuntu-latest

   steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy To Ec2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST}}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY}}
          